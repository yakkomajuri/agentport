name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    name: Server tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run pytest -q
